<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة التربية السورية - نتائج الامتحانات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e3a8a; --accent: #0284c7; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; padding: 15px; box-sizing: border-box; }
        .noti-btn { background: none; border: none; font-size: 24px; color: var(--primary); cursor: pointer; position: relative; }
        .noti-badge { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: red; border-radius: 50%; }
        .logo-area { text-align: center; margin-top: 20px; }
        .logo-area img { width: 90px; height: auto; }
        .logo-area h2 { color: var(--primary); margin: 10px 0 5px 0; font-size: 1.4rem; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 450px; text-align: center; margin-top: 20px; box-sizing: border-box; }
        input[type="number"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 18px; text-align: center; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }
        button.btn-search { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button.btn-search:hover { background: var(--accent); }
        .loading { display: none; margin-top: 15px; font-size: 16px; color: #64748b; }
        .error { color: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <button class="noti-btn" onclick="alert('لا توجد إشعارات جديدة حالياً')">
            <i class="fa-solid fa-bell"></i>
            <span class="noti-badge"></span>
        </button>
    </div>

    <div class="logo-area">
        <!-- شعار موحد للوزارة (رابط افتراضي متاح دائمًا) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Coat_of_arms_of_Syria.svg" alt="الشعار الوطني">
        <h2>الجمهورية العربية السورية</h2>
        <h3>وزارة التربية والتعليم - نتـائج الامتحـانات</h3>
    </div>

    <div class="container">
        <form id="searchForm" action="/search" method="POST" onsubmit="return handleSearch(event)">
            <label style="font-weight: bold; color: #334155;">أدخل رقم الاكتتاب الخاص بالطالب:</label>
            <input type="number" name="seat_number" placeholder="مثال: 12345" required>
            <button type="submit" class="btn-search" id="subBtn">بحث <i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        
        <div class="loading" id="loadingArea">
            جاري جلب النتيجة... ⏳
        </div>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </div>

    <script>
        function handleSearch(e) {
            e.preventDefault();
            document.getElementById('subBtn').style.display = 'none';
            document.getElementById('loadingArea').style.display = 'block';
            setTimeout(() => {
                document.getElementById('searchForm').submit();
            }, 1000); // تأخير ثانية واحدة تماماً كما طلبت
        }
    </script>
</body>
</html>
